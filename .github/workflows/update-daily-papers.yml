name: Update Daily Papers Page

on:
  schedule:
    # Run daily at 00:10 UTC
    - cron: '10 0 * * *'
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  update-daily-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch existing gh-pages content
        run: |
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            mkdir -p docs
            git --work-tree=docs checkout origin/gh-pages -- . 2>/dev/null || echo "No content in gh-pages yet"
          fi

      - name: Cache processed papers
        id: cache-processed-papers
        uses: actions/cache@v4
        with:
          path: .processed_papers.json
          key: ${{ runner.os }}-processed-papers-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-processed-papers-v2-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'  # Enable pip caching

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate RSS feed
        env:
          RSS_FEED_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/feed.xml
          RSS_TITLE: Hugging Face Papers RSS
          RSS_DESCRIPTION: Latest AI research papers from Hugging Face
        run: |
          python generate_rss.py

      - name: Fetch daily papers
        run: |
          python fetch_daily_papers.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ./docs
          keep_files: false
